<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돌잔치 초대장</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#fff6f6;
text-align:center;
overflow-x:hidden;
}

.container{
padding:40px 20px;
max-width:500px;
margin:auto;
}

.photo{
width:250px;
border-radius:20px;
margin:20px 0;
}

.slider{
position:relative;
max-width:340px;
height:340px;
margin:auto;
overflow:hidden;
}

.slide{
width:100%;
height:340px;
object-fit:cover;
display:none;
border-radius:20px;
}

.prev,.next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.3);
color:white;
border:none;
font-size:24px;
padding:10px;
border-radius:50%;
cursor:pointer;
}

.prev{left:10px;}
.next{right:10px;}

.dots{
margin-top:10px;
}

.dot{
height:10px;
width:10px;
margin:3px;
background:#ccc;
border-radius:50%;
display:inline-block;
cursor:pointer;
}

.active{
background:#ff8da1;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff8da1;
color:white;
font-size:16px;
cursor:pointer;
}

.share{
background:#ffe812;
color:black;
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

.modal{
display:none;
position:fixed;
z-index:10;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:80vh;
object-fit:contain;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>이하운의 첫 돌잔치에<br>초대합니다 🎉</h1>

<p>
사랑하는 하운이의 첫 생일을 맞아<br>
소중한 분들을 초대합니다.
</p>

<img src="baby0.JPG" class="photo">

⏰ 11:30 ~ 14:00<br>
📍 경기도 수원시 권선구 경수대로 270<br>
   터미널동 3층 마이어스 수원점<br>
   연회장 : R1

<h2>우리 아기 사진</h2>

<div class="slider">

<button class="prev" onclick="changeSlide(-1)">❮</button>

<img class="slide" src="baby1.JPG">
<img class="slide" src="baby2.JPG">
<img class="slide" src="baby3.JPG">
<img class="slide" src="baby4.JPG">
<img class="slide" src="baby5.JPG">
<img class="slide" src="baby6.JPG">
<img class="slide" src="baby7.JPG">
<img class="slide" src="baby8.JPG">
<img class="slide" src="baby9.JPG">
<img class="slide" src="baby10.JPG">
<img class="slide" src="baby11.JPG">
<img class="slide" src="baby12.JPG">
<img class="slide" src="baby13.JPG">
<img class="slide" src="baby14.JPG">
<img class="slide" src="baby15.JPG">
<img class="slide" src="baby16.JPG">
<img class="slide" src="baby17.JPG">
<img class="slide" src="baby18.JPG">
<img class="slide" src="baby19.JPG">
<img class="slide" src="baby20.JPG">

<button class="next" onclick="changeSlide(1)">❯</button>

</div>

<div class="dots" id="dots"></div>

<button onclick="toggleMusic()">🎵 음악 ON / OFF</button>

<br>

<button class="share" onclick="copyLink()">🔗 초대장 링크 복사</button>

<br><br>

📅 2026년 4월 18일 토요일<br>
⏰ 11:30 ~ 14:00<br>
📍 경기도 수원시 권선구 경수대로 270<br>
   터미널동 3층 마이어스 수원점<br>
   연회장 : R1

<br><br>

<h2>오시는 길</h2>

<iframe
width="100%"
height="200"
style="border:0; max-width:360px; border-radius:15px;"
loading="lazy"
allowfullscreen
src="https://maps.google.com/maps?q=마이어스수원점&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

<div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">

<a href="https://map.kakao.com/link/to/마이어스수원점,37.2497718,127.0217399" target="_blank">
<button style="background:#FEE500;color:black;">
📍 카카오맵
</button>
</a>

<a href="https://map.naver.com/v5/search/마이어스수원점" target="_blank">
<button style="background:#03C75A;color:white;">
📍 네이버지도
</button>
</a>

</div>

<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<audio id="bgm" loop>
<source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>

let slideIndex=0;
let slides=document.getElementsByClassName("slide");
let dotsContainer=document.getElementById("dots");
let slideTimer;

/* 점 생성 */

for(let i=0;i<slides.length;i++){

let dot=document.createElement("span");
dot.className="dot";

dot.onclick=function(){
slideIndex=i;
showSlide(slideIndex);
resetAutoSlide();
};

dotsContainer.appendChild(dot);

}

/* 슬라이드 표시 */

function showSlide(n){

if(n>=slides.length){slideIndex=0;}
if(n<0){slideIndex=slides.length-1;}

for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

let dots=document.getElementsByClassName("dot");

for(let i=0;i<dots.length;i++){
dots[i].classList.remove("active");
}

slides[slideIndex].style.display="block";
dots[slideIndex].classList.add("active");

}

/* 슬라이드 이동 */

function changeSlide(n){
slideIndex+=n;
showSlide(slideIndex);
resetAutoSlide();
}

/* 자동 슬라이드 */

function autoSlide(){
slideIndex++;
showSlide(slideIndex);
}

function startAutoSlide(){
slideTimer=setInterval(autoSlide,3000);
}

function resetAutoSlide(){
clearInterval(slideTimer);
startAutoSlide();
}

startAutoSlide();

showSlide(slideIndex);

/* 스와이프 */

let startX=0;

document.querySelector(".slider").addEventListener("touchstart",function(e){
startX=e.touches[0].clientX;
});

document.querySelector(".slider").addEventListener("touchend",function(e){

let endX=e.changedTouches[0].clientX;

if(startX-endX>50){changeSlide(1);}
if(endX-startX>50){changeSlide(-1);}

});

/* 사진 확대 */

document.querySelectorAll(".slide").forEach(function(img){

img.onclick=function(){

clearInterval(slideTimer);

document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=this.src;

};

});

function closeModal(){

document.getElementById("modal").style.display="none";
resetAutoSlide();

}

/* 음악 */

let music=document.getElementById("bgm");

function toggleMusic(){

if(music.paused){
music.play();
}else{
music.pause();
}

}

/* 공유 */

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("초대장 링크가 복사되었습니다!");
}


/* 하트 */

setInterval(createHeart,500);

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);

}

</script>

</body>
</html>
