<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>돌잔치 초대장</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#fff6f6;
text-align:center;
overflow-x:hidden;
}

.container{
padding:40px 20px;
}

h1{
font-size:28px;
}

.photo{
width:250px;
border-radius:20px;
margin:20px 0;
}

.prev, .next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.3);
color:white;
border:none;
font-size:24px;
padding:10px;
border-radius:50%;
}

.prev{
left:10px;
}

.next{
right:10px;
}

.slider{
position:relative;
max-width:320px;
margin:auto;
}

.slide{
width:100%;
display:none;
border-radius:20px;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff8da1;
color:white;
font-size:16px;
}

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>돌잔치에 초대합니다 🎉</h1>

<p>
사랑하는 ○○의 첫 생일을 맞아<br>
소중한 분들을 초대합니다.
</p>

<img src="baby.jpg" class="photo">

<h2>우리 아기 사진</h2>

<div class="slider">

<button class="prev" onclick="changeSlide(-1)">❮</button>

<img class="slide" src="baby1.jpg">
<img class="slide" src="baby2.jpg">
<img class="slide" src="baby3.jpg">
<img class="slide" src="baby4.jpg">
<img class="slide" src="baby5.jpg">
<img class="slide" src="baby6.jpg">
<img class="slide" src="baby7.jpg">
<img class="slide" src="baby8.jpg">
<img class="slide" src="baby9.jpg">
<img class="slide" src="baby10.jpg">
<img class="slide" src="baby11.jpg">
<img class="slide" src="baby12.jpg">
<img class="slide" src="baby13.jpg">
<img class="slide" src="baby14.jpg">
<img class="slide" src="baby15.jpg">
<img class="slide" src="baby16.jpg">
<img class="slide" src="baby17.jpg">
<img class="slide" src="baby18.jpg">
<img class="slide" src="baby19.jpg">
<img class="slide" src="baby20.jpg">

<button class="next" onclick="changeSlide(1)">❯</button>

</div>

<br>

<button onclick="toggleMusic()">🎵 음악 ON / OFF</button>

<br><br>

📅 2026년 4월 10일<br>
⏰ 오후 5시<br>
📍 ○○호텔

<br><br>

<h2>오시는 길</h2>

<iframe
width="90%"
height="250"
style="border:0"
loading="lazy"
allowfullscreen
src="https://maps.google.com/maps?q=seoul&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

<audio id="bgm" loop>
<source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>

let slideIndex = 0;

showSlides();

function showSlides(){

let slides = document.getElementsByClassName("slide");

for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

slideIndex++;

if(slideIndex>slides.length){
slideIndex=1;
}

slides[slideIndex-1].style.display="block";

setTimeout(showSlides,2500);

}

let music=document.getElementById("bgm");

function toggleMusic(){

if(music.paused){
music.play();
}else{
music.pause();
}

}

setInterval(createHeart,500);

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

</script>

</body>
</html>
